<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overgreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    #top-row { display: flex; flex: 1; min-height: 0; }
    #sidebar {
      width: 260px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto; flex-shrink: 0;
    }
    #sidebar h1 { font-size: 18px; color: #8f8; }
    #canvas-container {
      flex: 1; position: relative; overflow: hidden;
    }
    canvas { display: block; }
    button {
      padding: 4px 12px; cursor: pointer;
      background: #333; color: #ccc; border: 1px solid #555;
      font-family: monospace; font-size: 13px;
    }
    button:hover { background: #444; }
    .btn-group { display: flex; gap: 4px; }
    .stats { font-size: 12px; line-height: 1.6; }
    .inspector {
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
      background: #222; padding: 8px; border-radius: 4px;
      min-height: 120px; max-height: 200px; overflow-y: auto;
      flex-shrink: 0;
    }
    #showcase::-webkit-scrollbar { display: none; }
    label { font-size: 12px; }
    input[type="range"] { width: 100%; }
    #bottom-panel {
      height: 190px; flex-shrink: 0;
      display: flex; background: #1e1e1e;
      border-top: 1px solid #333;
    }
    #charts-wrapper {
      flex: 7; display: flex; flex-direction: column; min-width: 0;
    }
    #chart-tabs {
      display: flex; gap: 0; flex-shrink: 0; background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    .chart-tab {
      padding: 3px 12px; cursor: pointer;
      background: transparent; color: #666; border: none;
      font-family: monospace; font-size: 11px;
      border-bottom: 2px solid transparent;
    }
    .chart-tab:hover { color: #aaa; }
    .chart-tab.active { color: #8f8; border-bottom-color: #8f8; }
    #genomes-container, #population-container, #traits-container {
      flex: 1; position: relative; overflow: hidden;
    }
    #genomes-container { overflow: hidden; }
    #population-container canvas, #traits-container canvas { width: 100%; height: 100%; display: block; }
    #ticker-container {
      flex: 3; overflow-y: auto;
      border-left: 1px solid #333;
      padding: 6px; font-size: 11px; line-height: 1.4;
    }
    #ticker-list .event {
      padding: 2px 0; display: flex; align-items: baseline; gap: 4px;
    }
    #ticker-list .event-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    #ticker-list .event-new {
      animation: ticker-fade 0.6s ease-out;
    }
    @keyframes ticker-fade {
      from { background: rgba(136,255,136,0.12); }
      to { background: transparent; }
    }
  </style>
</head>
<body>
  <div id="top-row">
  <div id="sidebar">
    <h1>Overgreen</h1>
    <div class="btn-group">
      <button id="btn-play-pause">Pause</button>
      <button id="btn-step">Step</button>
    </div>
    <div>
      <label>Speed: <span id="speed-label">5</span> ticks/sec</label>
      <input type="range" id="speed-slider" min="1" max="50" value="3" />
    </div>
    <div>
      <label><input type="checkbox" id="color-mode-toggle" /> Species colors</label>
    </div>
    <div class="stats">
      <div>Tick: <span id="tick-label">0</span> &mdash; <span id="season-label">Spring</span> (Year <span id="year-label">1</span>)</div>
      <div>Era: <span id="era-label" style="color:#d4a030; font-weight:bold;">Temperate</span></div>
      <div>Plants: <span id="plant-count">0</span> &nbsp; Deer: <span id="herbivore-count">0</span></div>
    </div>
    <div class="inspector" id="inspector">Click a cell to inspect...</div>
    <div id="showcase" style="flex:1; overflow-y:auto; border-top:1px solid #333; padding-top:8px; margin-top:4px; scrollbar-width:none;"></div>
  </div>
  <div id="canvas-container"></div>
  </div>
  <div id="bottom-panel">
    <div id="charts-wrapper">
      <div id="chart-tabs">
        <button class="chart-tab active" data-chart="genomes">Genomes</button>
        <button class="chart-tab" data-chart="population">Population</button>
        <button class="chart-tab" data-chart="traits">Traits</button>
      </div>
      <div id="genomes-container"></div>
      <div id="population-container" style="display:none"></div>
      <div id="traits-container" style="display:none"></div>
    </div>
    <div id="ticker-container">
      <div style="color:#8f8; font-size:12px; margin-bottom:4px;">Events</div>
      <div id="ticker-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
