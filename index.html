<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overgreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    #top-row { display: flex; flex: 1; min-height: 0; }
    #sidebar {
      width: 260px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto; flex-shrink: 0;
    }
    #sidebar h1 { font-size: 18px; color: #8f8; }
    #canvas-container {
      flex: 1; position: relative; overflow: hidden;
    }
    #sandbox-panel { flex-shrink: 0; }
    canvas { display: block; }
    button {
      padding: 4px 12px; cursor: pointer;
      background: #333; color: #ccc; border: 1px solid #555;
      font-family: monospace; font-size: 13px;
    }
    button:hover { background: #444; }
    .btn-group { display: flex; gap: 4px; }
    .stats { font-size: 12px; line-height: 1.6; }
    .inspector {
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
      background: #222; padding: 8px; border-radius: 4px;
      min-height: 120px; max-height: 200px; overflow-y: auto;
      flex-shrink: 0;
    }
    label { font-size: 12px; }

    /* Section groups */
    .section-group { display: flex; flex-direction: column; gap: 6px; }
    .section-group + .section-group { border-top: 1px solid #2a2a2a; padding-top: 8px; }
    .group-label { font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Scenario row */
    .scenario-row { display: flex; gap: 4px; align-items: center; }
    #scenario-select {
      flex: 1; font-family: monospace; font-size: 12px;
      background: #333; color: #ccc; border: 1px solid #555; padding: 3px 4px;
    }
    #btn-load-scenario { font-size: 11px; padding: 3px 8px; }

    /* Play/Pause */
    #btn-play-pause {
      width: 100%; font-size: 16px; padding: 8px 0;
      background: #2a3a2a; color: #8f8; border-color: #4a7a4a;
    }
    #btn-play-pause:hover { background: #334a33; }
    #btn-play-pause.paused { background: #333; color: #888; border-color: #555; }
    #btn-play-pause.paused:hover { background: #3a3a3a; color: #aaa; }

    /* Speed presets */
    .speed-group { display: flex; gap: 3px; }
    .speed-btn { flex: 1; padding: 4px 0; font-size: 11px; text-align: center; }
    .speed-btn.active { background: #2a3a2a; color: #8f8; border-color: #4a7a4a; }

    /* Fast-forward pulse */
    @keyframes ff-pulse {
      0%, 100% { border-color: #4a7a4a; }
      50% { border-color: #8f8; }
    }
    #btn-play-pause.ff-active:not(.paused) {
      animation: ff-pulse 1s ease-in-out infinite;
    }

    /* Sandbox */
    #btn-sandbox { width: 100%; }

    /* Era label */
    #era-label { color: #d4a030; font-weight: bold; }

    /* Showcase */
    #showcase { flex: 1; overflow-y: auto; scrollbar-width: none; }
    #showcase::-webkit-scrollbar { display: none; }
    #bottom-panel {
      height: 190px; flex-shrink: 0;
      display: flex; background: #1e1e1e;
      border-top: 1px solid #333;
    }
    #charts-wrapper {
      flex: 7; display: flex; flex-direction: column; min-width: 0;
    }
    #chart-tabs {
      display: flex; gap: 0; flex-shrink: 0; background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    .chart-tab {
      padding: 3px 12px; cursor: pointer;
      background: transparent; color: #666; border: none;
      font-family: monospace; font-size: 11px;
      border-bottom: 2px solid transparent;
    }
    .chart-tab:hover { color: #aaa; }
    .chart-tab.active { color: #8f8; border-bottom-color: #8f8; }
    #genomes-container, #population-container, #traits-container {
      flex: 1; position: relative; overflow: hidden;
    }
    #genomes-container { overflow: hidden; }
    #population-container canvas, #traits-container canvas { width: 100%; height: 100%; display: block; }
    #ticker-container {
      flex: 3; overflow-y: auto;
      border-left: 1px solid #333;
      padding: 6px; font-size: 11px; line-height: 1.4;
    }
    #ticker-list .event {
      padding: 2px 0; display: flex; align-items: baseline; gap: 4px;
    }
    #ticker-list .event-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    #ticker-list .event-new {
      animation: ticker-fade 0.6s ease-out;
    }
    @keyframes ticker-fade {
      from { background: rgba(136,255,136,0.12); }
      to { background: transparent; }
    }

    /* ── Hook phase ── */
    body.hook-active #sidebar {
      width: 0; min-width: 0; padding: 0; overflow: hidden;
      pointer-events: none; opacity: 0;
    }
    body.hook-active #bottom-panel {
      height: 0; min-height: 0; overflow: hidden;
      pointer-events: none; opacity: 0;
    }
    #sidebar {
      transition: width 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  min-width 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  padding 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 400ms ease;
    }
    #bottom-panel {
      transition: height 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  min-height 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 400ms ease;
    }

    #hook-overlay {
      position: absolute; inset: 0; pointer-events: none;
      z-index: 50; display: flex; flex-direction: column;
      justify-content: flex-end; padding: 24px;
    }
    #hook-overlay.hidden { display: none; }
    #hook-title {
      font-size: 28px; color: #8f8; opacity: 0.5;
      font-family: monospace; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      transition: opacity 600ms ease;
    }
    #hook-subtitle {
      font-size: 13px; color: #888; opacity: 0;
      font-family: monospace; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      transition: opacity 800ms ease;
      margin-top: 2px;
    }
    #hook-subtitle.visible { opacity: 0.7; }
    #hook-stats {
      position: absolute; bottom: 24px; right: 24px;
      font-size: 12px; color: #555; font-family: monospace;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      opacity: 0; transition: opacity 600ms ease;
    }
    #hook-stats.visible { opacity: 1; }
    #hook-skip {
      position: absolute; top: 16px; right: 16px;
      font-size: 11px; color: #444; font-family: monospace;
      background: rgba(0,0,0,0.3); border: 1px solid #333;
      padding: 4px 10px; cursor: pointer; pointer-events: auto;
      transition: color 200ms, border-color 200ms;
    }
    #hook-skip:hover { color: #888; border-color: #555; }

    /* Commentary during hook — centered top */
    #hook-commentary {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      font-size: 15px; color: #8f8; font-family: monospace;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      opacity: 0; transition: opacity 600ms ease;
      white-space: nowrap;
    }
    #hook-commentary.visible { opacity: 1; }
  </style>
</head>
<body class="hook-active">
  <div id="top-row">
  <div id="sidebar">
    <div class="section-group">
      <h1>Overgreen</h1>
    </div>

    <div class="section-group">
      <div class="group-label">Scenario</div>
      <div class="scenario-row">
        <select id="scenario-select">
          <option value="">Random (default)</option>
        </select>
        <button id="btn-load-scenario">Load</button>
      </div>
      <label><input type="checkbox" id="single-seed-toggle" checked /> Single seed start</label>
    </div>

    <div class="section-group">
      <div class="group-label">Playback</div>
      <button id="btn-play-pause">Pause</button>
      <div class="speed-group">
        <button class="speed-btn" data-preset="1x">1&times;</button>
        <button class="speed-btn active" data-preset="2x">2&times;</button>
        <button class="speed-btn" data-preset="5x">5&times;</button>
        <button class="speed-btn" data-preset="10x">10&times;</button>
        <button class="speed-btn" data-preset="ff">&gt;&gt;</button>
      </div>
    </div>

    <div class="section-group">
      <div class="group-label">View</div>
      <label><input type="checkbox" id="color-mode-toggle" /> Species colors</label>
      <label><input type="checkbox" id="labels-toggle" /> Species labels</label>
      <label><input type="checkbox" id="terrain-view-toggle" /> Terrain labels</label>
      <label><input type="checkbox" id="hover-toggle" checked /> Hover highlight</label>
    </div>

    <div class="section-group">
      <div class="group-label">Tools</div>
      <button id="btn-sandbox">Sandbox</button>
    </div>

    <div class="section-group">
      <div class="group-label">Status</div>
      <div class="stats">
        <div>Tick: <span id="tick-label">0</span> &mdash; <span id="season-label">Spring</span> (Year <span id="year-label">1</span>)</div>
        <div>Era: <span id="era-label">Temperate</span></div>
        <div>Plants: <span id="plant-count">0</span> &nbsp; Deer: <span id="herbivore-count">0</span></div>
      </div>
    </div>

    <div class="section-group">
      <div class="group-label">Inspector</div>
      <div class="inspector" id="inspector">Click a cell to inspect...</div>
    </div>

  </div>
  <div id="canvas-container">
    <div id="hook-overlay" class="hidden">
      <div id="hook-commentary"></div>
      <button id="hook-skip">Skip intro</button>
      <div id="hook-stats"></div>
      <div id="hook-title">Overgreen</div>
      <div id="hook-subtitle">One seed. One world.</div>
    </div>
  </div>
  <div id="sandbox-panel" class="hidden"></div>
  </div>
  <div id="bottom-panel">
    <div id="charts-wrapper">
      <div id="chart-tabs">
        <button class="chart-tab active" data-chart="genomes">Genomes</button>
        <button class="chart-tab" data-chart="population">Population</button>
        <button class="chart-tab" data-chart="traits">Traits</button>
      </div>
      <div id="genomes-container"></div>
      <div id="population-container" style="display:none"></div>
      <div id="traits-container" style="display:none"></div>
    </div>
    <div id="ticker-container">
      <div style="color:#8f8; font-size:12px; margin-bottom:4px;">Events</div>
      <div id="ticker-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
