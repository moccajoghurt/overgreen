<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overgreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; display: flex; height: 100vh; }
    #sidebar {
      width: 260px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto;
    }
    #sidebar h1 { font-size: 18px; color: #8f8; }
    #canvas-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    canvas { image-rendering: pixelated; border: 1px solid #333; }
    button {
      padding: 4px 12px; cursor: pointer;
      background: #333; color: #ccc; border: 1px solid #555;
      font-family: monospace; font-size: 13px;
    }
    button:hover { background: #444; }
    .btn-group { display: flex; gap: 4px; }
    .stats { font-size: 12px; line-height: 1.6; }
    .inspector {
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
      background: #222; padding: 8px; border-radius: 4px; min-height: 120px;
    }
    label { font-size: 12px; }
    input[type="range"] { width: 100%; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>Overgreen</h1>
    <div class="btn-group">
      <button id="btn-play-pause">Pause</button>
      <button id="btn-step">Step</button>
    </div>
    <div>
      <label>Speed: <span id="speed-label">5</span> ticks/sec</label>
      <input type="range" id="speed-slider" min="1" max="50" value="3" />
    </div>
    <div class="stats">
      <div>Tick: <span id="tick-label">0</span></div>
      <div>Plants: <span id="plant-count">0</span></div>
    </div>
    <div class="inspector" id="inspector">Click a cell to inspect...</div>
    <div style="font-size:11px; line-height:1.6; color:#999; border-top:1px solid #333; padding-top:8px; margin-top:4px;">
      <div style="color:#8f8; font-size:12px; margin-bottom:4px;">Legend</div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
        <span style="display:inline-block; width:14px; height:14px; background:hsl(30,40%,55%); border:1px solid #555;"></span> Dry soil
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
        <span style="display:inline-block; width:14px; height:14px; background:hsl(25,50%,25%); border:1px solid #555;"></span> Wet soil
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
        <span style="display:inline-block; width:14px; height:14px; background:hsl(20,50%,20%); border:1px solid #555;"></span> Nutrient-rich soil
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
        <span style="display:inline-block; width:14px; height:14px; background:#333; position:relative;"><span style="display:block;width:6px;height:6px;background:hsl(120,70%,50%);position:absolute;top:4px;left:4px;"></span></span> Seedling <span style="color:#666">(small, bright)</span>
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
        <span style="display:inline-block; width:14px; height:14px; background:#333; position:relative;"><span style="display:block;width:12px;height:12px;background:hsl(120,70%,35%);position:absolute;top:1px;left:1px;"></span></span> Mature plant <span style="color:#666">(large, mid)</span>
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
        <span style="display:inline-block; width:14px; height:14px; background:#333; position:relative;"><span style="display:block;width:14px;height:14px;background:hsl(120,70%,20%);position:absolute;top:0;left:0;"></span></span> Tall tree <span style="color:#666">(full, dark)</span>
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <span style="display:inline-block; width:14px; height:14px; background:#333; position:relative;"><span style="display:block;width:14px;height:14px;background:rgba(0,0,0,0.3);position:absolute;top:0;left:0;"></span></span> Shaded area
      </div>
      <div style="color:#888; font-size:10px; line-height:1.4;">
        Size = leaf area &middot; Darkness = height<br>
        Plants compete for water &amp; light.<br>
        Seeds carry mutated genomes &rarr; evolution.
      </div>
    </div>
  </div>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
