<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overgreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; display: flex; height: 100vh; }
    #sidebar {
      width: 260px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto;
    }
    #sidebar h1 { font-size: 18px; color: #8f8; }
    #canvas-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    canvas { image-rendering: pixelated; border: 1px solid #333; }
    button {
      padding: 4px 12px; cursor: pointer;
      background: #333; color: #ccc; border: 1px solid #555;
      font-family: monospace; font-size: 13px;
    }
    button:hover { background: #444; }
    .btn-group { display: flex; gap: 4px; }
    .stats { font-size: 12px; line-height: 1.6; }
    .inspector {
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
      background: #222; padding: 8px; border-radius: 4px; min-height: 120px;
    }
    label { font-size: 12px; }
    input[type="range"] { width: 100%; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>Overgreen</h1>
    <div class="btn-group">
      <button id="btn-play-pause">Pause</button>
      <button id="btn-step">Step</button>
    </div>
    <div>
      <label>Speed: <span id="speed-label">1</span> ticks/frame</label>
      <input type="range" id="speed-slider" min="1" max="10" value="1" />
    </div>
    <div class="stats">
      <div>Tick: <span id="tick-label">0</span></div>
      <div>Plants: <span id="plant-count">0</span></div>
    </div>
    <div class="inspector" id="inspector">Click a cell to inspect...</div>
  </div>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
